services:
  web:
    build: apps/web
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:3000

  api:
    build: apps/api
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://demo:demo@db:5432/demotape_example
      - PORT=3000

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demotape_example
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: apps/worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://demo:demo@db:5432/demotape_example

volumes:
  pgdata:
